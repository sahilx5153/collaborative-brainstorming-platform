<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IdeaFlow Pro | Bright Ideas</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.2);
            --primary: #fcd34d; /* Light bulb yellow */
            --secondary: #6366f1;
            --accent: #f472b6;
            --text: #ffffff;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&q=80&w=2072');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            padding: 2rem;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Logo and Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }

        .bulb-logo {
            width: 50px;
            height: 50px;
            filter: drop-shadow(0 0 8px var(--primary));
            animation: pulse-glow 2s infinite alternate;
        }

        @keyframes pulse-glow {
            from { filter: drop-shadow(0 0 5px var(--primary)); transform: scale(1); }
            to { filter: drop-shadow(0 0 20px var(--primary)); transform: scale(1.05); }
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: -1px;
            color: white;
            text-transform: uppercase;
        }

        /* Input Glass Panel */
        .input-panel {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 20px;
            display: grid;
            grid-template-columns: 2fr 1fr auto;
            gap: 1rem;
            margin-bottom: 3rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        input, select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 18px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus { 
            background: rgba(255, 255, 255, 0.15); 
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(252, 211, 77, 0.3);
        }

        select option { background: #1e293b; }

        button {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:hover {
            transform: translateY(-3px);
            filter: brightness(1.2);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
        }

        /* Board Cards */
        .board {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            transition: 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.18);
            border-color: var(--primary);
        }

        .cat-badge {
            font-size: 0.65rem;
            padding: 4px 10px;
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border);
            text-transform: uppercase;
            font-weight: bold;
        }

        .idea-text {
            font-size: 1.15rem;
            margin: 1.5rem 0;
            line-height: 1.4;
        }

        .card-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .vote-btn {
            background: rgba(252, 211, 77, 0.15);
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 5px 15px;
            border-radius: 8px;
        }

        .vote-btn:hover { background: var(--primary); color: #000; }

        .btn-del { 
            background: transparent; 
            color: #ff4d4d; 
            font-size: 0.8rem;
            padding: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-container">
            <img src="https://cdn-icons-png.flaticon.com/512/702/702797.png" alt="Bulb Logo" class="bulb-logo">
            <span class="logo-text">IdeaFlow</span>
        </div>
        <button onclick="exportData()" style="background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border);">Download Log</button>
    </header>

    <div class="input-panel">
        <input type="text" id="ideaInput" placeholder="Got a bright idea? Share it here...">
        <select id="catInput">
            <option value="💡 Concept">💡 Concept</option>
            <option value="🚀 Growth">🚀 Growth</option>
            <option value="🎨 Creative">🎨 Creative</option>
            <option value="🛠️ Technical">🛠️ Technical</option>
        </select>
        <button onclick="saveIdea()">Ignite Idea</button>
    </div>

    <div id="board" class="board"></div>
</div>

<script>
    let storage = JSON.parse(localStorage.getItem('bulb_ideas')) || [];

    function saveIdea() {
        const txt = document.getElementById('ideaInput');
        const cat = document.getElementById('catInput');
        if(!txt.value.trim()) return;

        storage.push({
            id: Date.now(),
            text: txt.value,
            category: cat.value,
            votes: 0
        });
        txt.value = '';
        render();
    }

    function render() {
        const board = document.getElementById('board');
        board.innerHTML = '';
        storage.sort((a,b) => b.votes - a.votes).forEach(item => {
            board.innerHTML += `
                <div class="card">
                    <span class="cat-badge">${item.category}</span>
                    <p class="idea-text">${item.text}</p>
                    <div class="card-actions">
                        <button class="vote-btn" onclick="vote(${item.id})">Vote Up ${item.votes}</button>
                        <button class="btn-del" onclick="del(${item.id})">Remove</button>
                    </div>
                </div>
            `;
        });
        localStorage.setItem('bulb_ideas', JSON.stringify(storage));
    }

    function vote(id) {
        const i = storage.findIndex(x => x.id === id);
        storage[i].votes++;
        render();
    }

    function del(id) {
        storage = storage.filter(x => x.id !== id);
        render();
    }

    function exportData() {
        const output = storage.map(i => `${i.category}: ${i.text} (${i.votes} votes)`).join('\n');
        const blob = new Blob([output], {type: 'text/plain'});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'IdeaFlow_Report.txt';
        link.click();
    }

    render();
</script>

</body>
</html> -->
